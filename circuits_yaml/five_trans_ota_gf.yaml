pdk_lib_path: "/Users/garrett/workspace/pdk/gf180mcu/libraries/gf180mcu_fd_pr/latest/models/ngspice/gf180mcu.lib.spice"
align_pdk_path: "/path/to/ALIGN-pdk-gf180mcu/GF180MCU_PDK/"
pex_script_path: "./test_magic_pex.py"
results_dir: "./five_trans_ota_gf_test_folder/fom_test"

user_specs: "Primary goal: Maximize DC gain and UGBW while minimizing power consumption for a five transistor OTA with 1pF load."
user_specs_metric: "fom > 1.1 AND dc_gain_db > 45 AND ugbw > 15 AND power_dc < 70"

params:
  vdd: 3.30
  vcm: 1.65
  cload: 1e-12
  ibias: 10e-6

variable:
  L_tail_base: null
  L_diff_base: null
  L_load_base: null
  W_tail_base: null
  W_diff_base: null
  W_load_base: null

L_values: [0.28e-6, 0.42e-6, 0.56e-6, 0.84e-6, 1.12e-6, 1.68e-6, 2.24e-6, 3.36e-6]  
W_values: [0.60e-6, 1.20e-6, 1.80e-6, 2.40e-6, 3.60e-6, 4.80e-6, 7.20e-6, 9.60e-6]

length_scales:
  L_tail:   [L_tail_base, 2]
  L_diff:   [L_diff_base, 1]
  L_load:   [L_load_base, 2]

width_scales:
  W_tail:   [W_tail_base, 4]
  W_diff:   [W_diff_base, 4]
  W_load:   [W_load_base, 4]

subckt_name: FIVE_TRANSISTOR_OTA
subckt_pins:
  - VSS
  - VDD
  - VOUT
  - VINN
  - VINP
  - ID

I_O_pins:
  - VSS
  - VDD
  - VOUT
  - VINN
  - VINP
  - ID

testbench_signals:
  VSS: VSS
  VDD: VDD
  VOUT: VOUT
  VINN: VINN
  VINP: VINP
  ID: ID

metrics:
  - dc_gain_db
  - ugbw
  - power_dc
  - fom_user
base_metrics:
  gain_db:
    name: "Gain"
    unit: "dB"
    format: ".1f"
    degradation_key: "gain_percent"

  power_uw:
    name: "Power"
    unit: "µW"
    format: ".1f"
    degradation_key: "power_percent"

  ugbw_mhz:
    name: "UGBW"
    unit: "MHz"
    format: ".1f"
    degradation_key: "ugbw_percent"

  area:
    name: "Area"
    unit: "µm²"
    format: ".1f"
    degradation_key: "area_percent"

  fom_user:
    name: "FOM"
    unit: ""
    format: ".3f"
    degradation_key: "fom_percent"

# New: how to present each metric
metric_post:
  dc_gain_db:
    scale: 1
    decimals: 2
    unit: "dB"

  ugbw:
    scale: 1e-6
    decimals: 2
    unit: "MHz"

  power_dc:
    scale: 1e6
    decimals: 2
    unit: "µW"

  fom_user:
    expr: "dc_gain_db * ugbw / power_dc"
    scale: 1
    decimals: 3
    unit: ""



# keep this block present (your code expects this key), but it won’t be injected;
# the subckt is inlined below inside testbench_template
ota_subckt_template: |
    .subckt FIVE_TRANSISTOR_OTA VSS VDD VOUT VINN VINP ID
    xm5 ID     ID VSS VSS nmos_3p3 w={W_tail} l={L_tail} 
    xm4 SOURCE ID VSS VSS nmos_3p3 w={W_tail} l={L_tail} 
    xm3 VOUT VINN SOURCE VSS nmos_3p3 w={W_diff} l={L_diff} 
    xm0 NET8 VINP SOURCE VSS nmos_3p3 w={W_diff} l={L_diff} 
    xm2 VOUT NET8 VDD VDD pmos_3p3 w={W_load} l={L_load} 
    xm1 NET8 NET8 VDD VDD pmos_3p3 w={W_load} l={L_load} 
    .ends FIVE_TRANSISTOR_OTA


testbench_template: |
  * OTA testbench
    .lib {pdk_lib_path} tt
    
    {ota_subckt}
    
    VDD VDD 0 DC {vdd}
    VSS VSS 0 DC 0
    IBIAS VDD ID DC {ibias}
    VINP VINP 0 DC {vcm} AC 0.5
    VINN VINN 0 DC {vcm} AC -0.5
    XOTA {inst_pins} {subckt_name}
    CLOAD VOUT 0 {cload}
    .op
    .control
    op
    let vdd_current = abs(i(VDD))
    let power_dc = vdd_current * {vdd}
    print power_dc
    ac dec 100 1 10g
    let vout_ac = v(VOUT)
    let gain_db = db(vout_ac)
    let dc_gain_db = gain_db[0]
    print dc_gain_db
    if dc_gain_db > 0
        meas ac ugbw WHEN gain_db=0 CROSS=1
    end
    quit
    .endc
    .end

